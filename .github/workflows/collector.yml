name: Arma Mods Collector

# =============================================================================
# COLLECTOR SWITCH — edit the `enabled=` line in job `collector-gate` only.
# Requires secrets.BATTLEMETRICS_API_KEY (paid BattleMetrics PAT) when true.
# false → all collect/trending jobs skip (no more red 403 failures)
# true  → normal pipeline
# =============================================================================

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:      # Manual trigger

jobs:
  collector-gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.switch.outputs.enabled }}
    steps:
      - id: switch
        name: Collector enabled switch
        # >>> SWITCH: change false → true when BM API key is funded <<<
        run: echo "enabled=false" >> "$GITHUB_OUTPUT"

  # Reforger collection (priority - runs first)
  collect-reforger:
    needs: collector-gate
    if: needs.collector-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Reforger collector
        env:
          BATTLEMETRICS_API_KEY: ${{ secrets.BATTLEMETRICS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx scripts/collector.ts collect

  # Arma 3 collection (runs after Reforger - uses remaining API quota)
  collect-arma3:
    needs: [collector-gate, collect-reforger]
    if: needs.collector-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Arma 3 collector
        env:
          BATTLEMETRICS_API_KEY: ${{ secrets.BATTLEMETRICS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx scripts/collector.ts collect --game=arma3

  # Reforger trending snapshot
  trending-reforger:
    needs: [collector-gate, collect-reforger]
    if: needs.collector-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Reforger trending snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx scripts/collector.ts trending

  # Arma 3 trending snapshot (runs after Reforger trending)
  trending-arma3:
    needs: [collector-gate, trending-reforger]
    if: needs.collector-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Arma 3 trending snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx scripts/collector.ts trending --game=arma3
